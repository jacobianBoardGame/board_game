<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阿瓦隆互动介绍 | Chip Avalon</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #111827;
      --accent-soft: #f3f4f6;
      --good: #2563eb;
      --evil: #dc2626;
      --unknown: #9ca3af;
      --success: #059669;
      --fail: #b91c1c;
      --maxw: 1180px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(247,248,250,0.92);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .brand { font-weight: 800; font-size: 18px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn, .btn-link {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover, .btn-link:hover { background: var(--accent-soft); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .page {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 24px 20px 40px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }
    .panel h1, .panel h2, .panel h3 { margin-top: 0; }
    .controls { display: grid; gap: 16px; }
    .field-group { display: grid; gap: 10px; }
    .label { font-weight: 700; font-size: 14px; }
    .inline-row { display: flex; gap: 8px; flex-wrap: wrap; }
    input[type="number"], select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: white;
      width: 100%;
    }
    .role-pool {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .role-pill {
      border: 1px solid var(--line);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
      display: flex; justify-content: space-between; gap: 10px;
    }
    .helper { color: var(--muted); font-size: 13px; }
    .viz-wrap { display: grid; gap: 18px; }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; }
    .legend-item { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .mission-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .mission-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: white;
      display: grid;
      gap: 8px;
    }
    .mission-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 12px;
      font-weight: 700;
      background: var(--accent-soft);
    }
    .mission-status.success { background: #ecfdf3; color: var(--success); }
    .mission-status.fail { background: #fef2f2; color: var(--fail); }
    .mission-status.pending { background: #f3f4f6; color: var(--muted); }
    .note-box {
      border: 1px dashed var(--line);
      background: #fafafa;
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    svg { width: 100%; height: auto; display: block; }
    .player-node { cursor: pointer; }
    .player-label { font-size: 13px; font-weight: 700; text-anchor: middle; }
    .player-sub { font-size: 11px; fill: var(--muted); text-anchor: middle; }
    .table-label { font-size: 15px; font-weight: 800; text-anchor: middle; fill: var(--text); }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 12px; padding: 6px 10px; border-radius: 999px; background: var(--accent-soft); border: 1px solid var(--line); }
    .role-list { display: grid; gap: 8px; }
    .role-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">阿瓦隆互动介绍</div>
      <div class="toolbar">
        <a class="btn-link" href="./index.html">首页</a>
        <a class="btn-link" href="./calculator.html">结算工具</a>
        <a class="btn-link" href="./chip-rule-intro.html">当前规则互动页</a>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="panel controls">
      <div>
        <h1>标准阿瓦隆可视化</h1>
        <p class="helper">通过人数、身份池和任务结果，快速解释一局阿瓦隆是如何展开的。</p>
      </div>

      <div class="field-group">
        <div class="label">玩家数量</div>
        <div class="inline-row">
          <button class="btn" id="minus-player">−</button>
          <input type="number" id="player-count" min="5" max="10" step="1" value="5" />
          <button class="btn" id="plus-player">+</button>
        </div>
        <div class="helper">支持 5–10 人。点加号或减号后，座位和任务队伍规模会自动更新。</div>
      </div>

      <div class="field-group">
        <div class="label">身份池</div>
        <div class="role-pool" id="role-pool"></div>
        <div class="helper">点击身份可在玩家之间顺序分配。再次点击玩家节点可高亮该玩家。</div>
      </div>

      <div class="field-group">
        <div class="label">自动推荐身份</div>
        <div class="badge-row" id="recommended-badges"></div>
      </div>

      <div class="field-group">
        <div class="label">操作</div>
        <div class="inline-row">
          <button class="btn primary" id="auto-fill">套用推荐身份</button>
          <button class="btn" id="shuffle-roles">随机打乱</button>
          <button class="btn" id="clear-roles">清空身份</button>
        </div>
      </div>

      <div class="note-box" id="explain-box"></div>
    </section>

    <section class="viz-wrap">
      <section class="panel">
        <h2>桌面与玩家</h2>
        <div class="legend">
          <span class="legend-item"><span class="dot" style="background:#2563eb"></span>好人阵营</span>
          <span class="legend-item"><span class="dot" style="background:#dc2626"></span>坏人阵营</span>
          <span class="legend-item"><span class="dot" style="background:#9ca3af"></span>未分配</span>
        </div>
        <svg id="table-svg" viewBox="0 0 760 520"></svg>
      </section>

      <section class="card-grid">
        <section class="panel">
          <h2>任务轮次 1–5</h2>
          <div class="mission-grid" id="mission-grid"></div>
        </section>

        <section class="panel">
          <h2>当前说明</h2>
          <div class="role-list" id="summary-list"></div>
        </section>
      </section>
    </section>
  </main>

  <script>
    const missionTeamSizes = {
      5: [2, 3, 2, 3, 3],
      6: [2, 3, 4, 3, 4],
      7: [2, 3, 3, 4, 4],
      8: [3, 4, 4, 5, 5],
      9: [3, 4, 4, 5, 5],
      10: [3, 4, 4, 5, 5]
    };

    const recommendedRolesByCount = {
      5: ["梅林", "派西维尔", "忠臣", "刺客", "莫甘娜"],
      6: ["梅林", "派西维尔", "忠臣", "忠臣", "刺客", "莫甘娜"],
      7: ["梅林", "派西维尔", "忠臣", "忠臣", "刺客", "莫甘娜", "奥伯伦"],
      8: ["梅林", "派西维尔", "忠臣", "忠臣", "忠臣", "刺客", "莫甘娜", "莫德雷德"],
      9: ["梅林", "派西维尔", "忠臣", "忠臣", "忠臣", "忠臣", "刺客", "莫甘娜", "莫德雷德"],
      10: ["梅林", "派西维尔", "忠臣", "忠臣", "忠臣", "忠臣", "刺客", "莫甘娜", "莫德雷德", "奥伯伦"]
    };

    const roleCamp = {
      "梅林": "good",
      "派西维尔": "good",
      "忠臣": "good",
      "莫甘娜": "evil",
      "莫德雷德": "evil",
      "刺客": "evil",
      "奥伯伦": "evil"
    };

    const roleDescriptions = {
      "梅林": "知道多数坏人，但不能暴露自己。",
      "派西维尔": "通常围绕梅林/莫甘娜做判断。",
      "忠臣": "没有额外信息，依靠发言和任务判断。",
      "莫甘娜": "混淆派西维尔对梅林的识别。",
      "莫德雷德": "通常不会被梅林看到。",
      "刺客": "若坏人失败，可在终局刺杀梅林翻盘。",
      "奥伯伦": "特殊坏人，通常不被其他坏人识别。"
    };

    const state = {
      playerCount: 5,
      players: [],
      selectedPlayer: null,
      missions: [null, null, null, null, null]
    };

    const svg = d3.select("#table-svg");
    const rolePoolEl = document.getElementById("role-pool");
    const missionGridEl = document.getElementById("mission-grid");
    const summaryListEl = document.getElementById("summary-list");
    const explainBoxEl = document.getElementById("explain-box");
    const recommendedBadgesEl = document.getElementById("recommended-badges");

    function makePlayers(count) {
      state.players = Array.from({ length: count }, (_, i) => ({
        id: i + 1,
        name: `P${i + 1}`,
        role: null,
        camp: null
      }));
      state.selectedPlayer = null;
    }

    function clampCount(val) {
      return Math.max(5, Math.min(10, val));
    }

    function getRecommendedRoles() {
      return recommendedRolesByCount[state.playerCount].slice();
    }

    function updateRecommendedBadges() {
      recommendedBadgesEl.innerHTML = "";
      getRecommendedRoles().forEach(role => {
        const el = document.createElement("span");
        el.className = "badge";
        el.textContent = role;
        recommendedBadgesEl.appendChild(el);
      });
    }

    function updateRolePool() {
      rolePoolEl.innerHTML = "";
      const roles = ["梅林", "派西维尔", "忠臣", "莫甘娜", "莫德雷德", "刺客", "奥伯伦"];
      roles.forEach(role => {
        const count = state.players.filter(p => p.role === role).length;
        const pill = document.createElement("button");
        pill.className = "role-pill";
        pill.type = "button";
        pill.innerHTML = `<span>${role}</span><strong>${count}</strong>`;
        pill.addEventListener("click", () => assignRoleSequentially(role));
        rolePoolEl.appendChild(pill);
      });
    }

    function assignRoleSequentially(role) {
      const target = state.players.find(p => !p.role) || state.players[0];
      target.role = role;
      target.camp = roleCamp[role];
      state.selectedPlayer = target.id;
      renderAll();
    }

    function autoFillRoles() {
      const roles = getRecommendedRoles();
      state.players.forEach((p, i) => {
        p.role = roles[i] || null;
        p.camp = p.role ? roleCamp[p.role] : null;
      });
      renderAll();
    }

    function shuffleRoles() {
      const roles = state.players.map(p => p.role).filter(Boolean);
      for (let i = roles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [roles[i], roles[j]] = [roles[j], roles[i]];
      }
      state.players.forEach((p, i) => {
        p.role = roles[i] || null;
        p.camp = p.role ? roleCamp[p.role] : null;
      });
      renderAll();
    }

    function clearRoles() {
      state.players.forEach(p => {
        p.role = null;
        p.camp = null;
      });
      renderAll();
    }

    function renderTable() {
      svg.selectAll("*").remove();
      const width = 760;
      const height = 520;
      const centerX = width / 2;
      const centerY = height / 2 + 10;
      const radius = 170;

      svg.append("ellipse")
        .attr("cx", centerX)
        .attr("cy", centerY)
        .attr("rx", 170)
        .attr("ry", 110)
        .attr("fill", "#ffffff")
        .attr("stroke", "#d1d5db")
        .attr("stroke-width", 2);

      svg.append("text")
        .attr("class", "table-label")
        .attr("x", centerX)
        .attr("y", centerY + 6)
        .text(`阿瓦隆圆桌 · ${state.playerCount} 人局`);

      const angleStep = (Math.PI * 2) / state.playerCount;
      const nodes = state.players.map((player, index) => {
        const angle = -Math.PI / 2 + index * angleStep;
        return {
          ...player,
          x: centerX + Math.cos(angle) * radius,
          y: centerY + Math.sin(angle) * radius
        };
      });

      const groups = svg.selectAll(".player-node")
        .data(nodes)
        .enter()
        .append("g")
        .attr("class", "player-node")
        .attr("transform", d => `translate(${d.x},${d.y})`)
        .on("click", (_, d) => {
          state.selectedPlayer = d.id;
          renderAll();
        });

      groups.append("circle")
        .attr("r", d => state.selectedPlayer === d.id ? 40 : 34)
        .attr("fill", d => d.camp === "good" ? "#dbeafe" : d.camp === "evil" ? "#fee2e2" : "#f3f4f6")
        .attr("stroke", d => d.camp === "good" ? "#2563eb" : d.camp === "evil" ? "#dc2626" : "#9ca3af")
        .attr("stroke-width", d => state.selectedPlayer === d.id ? 4 : 2.5);

      groups.append("text")
        .attr("class", "player-label")
        .attr("dy", -4)
        .text(d => d.name);

      groups.append("text")
        .attr("class", "player-sub")
        .attr("dy", 16)
        .text(d => d.role || "未分配");
    }

    function renderMissions() {
      missionGridEl.innerHTML = "";
      const sizes = missionTeamSizes[state.playerCount];
      sizes.forEach((teamSize, idx) => {
        const status = state.missions[idx];
        const card = document.createElement("div");
        card.className = "mission-card";
        const statusClass = status === "success" ? "success" : status === "fail" ? "fail" : "pending";
        const statusText = status === "success" ? "成功" : status === "fail" ? "失败" : "未记录";
        card.innerHTML = `
          <strong>第 ${idx + 1} 轮</strong>
          <div class="helper">建议上车人数：${teamSize}</div>
          <div class="mission-status ${statusClass}">${statusText}</div>
          <div class="inline-row">
            <button class="btn" data-round="${idx}" data-status="success">成功</button>
            <button class="btn" data-round="${idx}" data-status="fail">失败</button>
            <button class="btn" data-round="${idx}" data-status="clear">清空</button>
          </div>
        `;
        missionGridEl.appendChild(card);
      });

      missionGridEl.querySelectorAll("button[data-round]").forEach(btn => {
        btn.addEventListener("click", () => {
          const round = Number(btn.dataset.round);
          const status = btn.dataset.status;
          state.missions[round] = status === "clear" ? null : status;
          renderSummary();
          renderMissions();
        });
      });
    }

    function renderSummary() {
      summaryListEl.innerHTML = "";
      const selected = state.players.find(p => p.id === state.selectedPlayer);
      const successCount = state.missions.filter(m => m === "success").length;
      const failCount = state.missions.filter(m => m === "fail").length;

      const entries = [
        { label: "好人数量", value: state.players.filter(p => p.camp === "good").length },
        { label: "坏人数量", value: state.players.filter(p => p.camp === "evil").length },
        { label: "任务成功", value: successCount },
        { label: "任务失败", value: failCount },
        { label: "当前高亮玩家", value: selected ? `${selected.name} · ${selected.role || "未分配"}` : "未选择" }
      ];

      entries.forEach(item => {
        const div = document.createElement("div");
        div.className = "role-item";
        div.innerHTML = `<span>${item.label}</span><strong>${item.value}</strong>`;
        summaryListEl.appendChild(div);
      });

      if (selected) {
        explainBoxEl.textContent = `${selected.name} 当前身份：${selected.role || "未分配"}。${selected.role ? roleDescriptions[selected.role] : "你可以点击左侧身份池，给这名玩家分配身份。"}`;
      } else {
        explainBoxEl.textContent = "先设置玩家人数，再分配身份和任务结果。这一页用于说明：一局阿瓦隆由座位、身份信息和 1–5 轮任务记录共同构成。";
      }
    }

    function renderAll() {
      updateRolePool();
      updateRecommendedBadges();
      renderTable();
      renderMissions();
      renderSummary();
    }

    function setPlayerCount(count) {
      state.playerCount = clampCount(count);
      document.getElementById("player-count").value = state.playerCount;
      state.missions = [null, null, null, null, null];
      makePlayers(state.playerCount);
      renderAll();
    }

    document.getElementById("plus-player").addEventListener("click", () => {
      setPlayerCount(state.playerCount + 1);
    });

    document.getElementById("minus-player").addEventListener("click", () => {
      setPlayerCount(state.playerCount - 1);
    });

    document.getElementById("player-count").addEventListener("change", (e) => {
      setPlayerCount(Number(e.target.value));
    });

    document.getElementById("auto-fill").addEventListener("click", autoFillRoles);
    document.getElementById("shuffle-roles").addEventListener("click", shuffleRoles);
    document.getElementById("clear-roles").addEventListener("click", clearRoles);

    setPlayerCount(5);
  </script>
</body>
</html>
